name: CI Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Debug files
        run: |
          echo "Current directory:"
          pwd
          echo "Files:"
          ls -R

      - name: Check index.html
        run: |
          if [ -f index.html ]; then
            echo "index.html found ✅"
          else
            echo "index.html NOT found ❌"
            exit 1
          fi